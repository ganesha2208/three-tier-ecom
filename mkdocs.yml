site_name: ShopForge — DevOps Portfolio
site_description: >-
  Production-grade DevOps portfolio: a three-tier e-commerce app shipped to AWS EKS
  via Terraform, Argo CD GitOps, Prometheus/Loki/Grafana observability, Chaos Mesh
  resilience drills, and k6 load tests.
site_url: https://ganesha2208.github.io/three-tier-ecom/
repo_url: https://github.com/ganesha2208/three-tier-ecom
repo_name: ganesha2208/three-tier-ecom
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Recap: recap.md
  - Phases:
      - Overview: phases/index.md
      - Phase 0 — App hardening: phases/phase-0.md
      - Phase 1 — Identity service: phases/phase-1.md
      - Phase 2 — Containers & supply chain: phases/phase-2.md
      - Phase 3 — DevSecOps CI/CD: phases/phase-3.md
      - Phase 4 — Terraform infra: phases/phase-4.md
      - Phase 5 — EKS + GitOps: phases/phase-5.md
      - Phase 6 — Observability: phases/phase-6.md
      - Phase 7 — Chaos engineering: phases/phase-7.md
      - Phase 8 — DR, load test, docs: phases/phase-8.md
  - Concept briefs:
      - Phase 0 — Why app hardening first: concept-briefs/phase-0.md
  - Runbooks:
      - DR runbook: dr-runbook.md
      - Chaos game day: chaos-gameday.md
  - Load test: load-test.md
  - Screenshots: screenshots.md
  - Demo video: demo-script.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ganesha2208
