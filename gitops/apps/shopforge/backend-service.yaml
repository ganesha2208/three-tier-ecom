# Stable in-cluster address for the backend pods. The Ingress routes
# /api/* traffic to this Service.
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: shopforge
  labels:
    app: backend
    app.kubernetes.io/part-of: shopforge
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
